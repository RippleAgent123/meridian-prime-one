<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MERIDIAN — Transaction Files</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Space+Mono:wght@400;700&family=DM+Sans:wght@200;300;400&display=swap" rel="stylesheet">
<style>
  :root { --black:#060606;--off-black:#0e0e0e;--surface:#131313;--border:#1c1c1c;--border-light:#242424;--white:#f8f8f6;--off-white:#e8e8e4;--muted:#4a4a4a;--dim:#2a2a2a;--red:#7a3030;--red-text:#c06060;--green:#2a5a2a;--green-text:#60a060; }
  * { margin:0;padding:0;box-sizing:border-box; }
  body { background:var(--black);color:var(--off-white);font-family:'DM Sans',sans-serif;font-weight:300;min-height:100vh; }
  body::after { content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");pointer-events:none;z-index:9999; }
  nav { position:fixed;top:0;left:0;right:0;z-index:100;padding:24px 64px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border);background:rgba(6,6,6,0.94);backdrop-filter:blur(20px); }
  .nav-logo { font-family:'Space Mono',monospace;font-size:12px;font-weight:700;letter-spacing:0.3em;color:var(--white); }
  .nav-tag  { font-family:'Space Mono',monospace;font-size:10px;letter-spacing:0.15em;color:var(--muted); }
  .page-wrapper { padding:120px 64px 80px;max-width:1060px;margin:0 auto; }
  .page-header { margin-bottom:40px;display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:16px; }
  .page-title { font-family:'Cormorant Garamond',serif;font-size:40px;font-weight:300;color:var(--white); }
  .btn-new { font-family:'Space Mono',monospace;font-size:10px;letter-spacing:0.15em;padding:10px 20px;background:none;border:1px solid var(--border-light);color:var(--muted);cursor:pointer;transition:all 0.15s; }
  .btn-new:hover { border-color:var(--off-white);color:var(--off-white); }

  /* FILE LIST */
  .file-list { display:flex;flex-direction:column;gap:1px;background:var(--border);border:1px solid var(--border); }

  .file-card { background:var(--off-black); }

  /* FILE HEADER ROW */
  .file-header { display:grid;grid-template-columns:1fr auto auto auto;gap:16px;align-items:center;padding:20px 24px;cursor:pointer;transition:background 0.15s; }
  .file-header:hover { background:var(--surface); }
  .file-card.open .file-header { background:var(--surface); }

  .file-name-block { display:flex;flex-direction:column;gap:4px; }
  .file-name { font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:300;color:var(--white); }
  .file-client { font-size:11px;color:var(--muted); }

  .file-stage { font-family:'Space Mono',monospace;font-size:9px;letter-spacing:0.1em;padding:4px 10px;border:1px solid var(--border-light);color:var(--muted); }
  .file-stage.closing  { border-color:#20283a;color:#6080a0; }
  .file-stage.pending  { border-color:#203a20;color:#60a060; }
  .file-stage.listed   { border-color:#3a2020;color:#a06060; }
  .file-stage.offer    { border-color:#3a3a20;color:#a0a060; }

  .file-date { font-family:'Space Mono',monospace;font-size:10px;color:var(--muted);white-space:nowrap; }
  .file-chevron { font-family:'Space Mono',monospace;font-size:10px;color:var(--muted);transition:transform 0.2s; }
  .file-card.open .file-chevron { transform:rotate(90deg); }

  /* FILE DETAIL */
  .file-detail { display:none;border-top:1px solid var(--border);padding:24px;background:var(--surface); }
  .file-card.open .file-detail { display:block; }

  .detail-grid { display:grid;grid-template-columns:1fr 1fr 1fr;gap:20px;margin-bottom:24px; }
  .d-block { display:flex;flex-direction:column;gap:6px; }
  .d-label { font-family:'Space Mono',monospace;font-size:9px;letter-spacing:0.18em;color:var(--muted);text-transform:uppercase; }
  .d-value { font-size:13px;color:var(--off-white);line-height:1.4; }

  /* DOCUMENTS */
  .docs-section { margin-bottom:20px; }
  .docs-title { font-family:'Space Mono',monospace;font-size:9px;letter-spacing:0.2em;color:var(--muted);margin-bottom:12px; }
  .docs-list { display:flex;flex-direction:column;gap:0;border:1px solid var(--border); }
  .doc-row { display:grid;grid-template-columns:1fr auto;gap:12px;align-items:center;padding:10px 14px;border-bottom:1px solid var(--border); }
  .doc-row:last-child { border-bottom:none; }
  .doc-name { font-size:12px;color:var(--off-white); }
  .doc-status { font-family:'Space Mono',monospace;font-size:9px;letter-spacing:0.1em;padding:3px 8px;border:1px solid; }
  .doc-status.ok      { border-color:var(--green);color:var(--green-text); }
  .doc-status.missing { border-color:var(--red);color:var(--red-text); }
  .doc-status.pending { border-color:#3a3a20;color:#a0a060; }

  /* NEXT ACTION */
  .next-action { display:flex;gap:12px;align-items:flex-start;padding:14px 16px;border:1px solid var(--border-light);background:rgba(255,255,255,0.02); }
  .na-prefix { font-family:'Space Mono',monospace;font-size:9px;letter-spacing:0.15em;color:var(--muted);flex-shrink:0;padding-top:2px; }
  .na-text { font-size:13px;color:var(--off-white);line-height:1.5; }

  @media (max-width:700px) { nav{padding:20px 24px;} .page-wrapper{padding:100px 24px 60px;} .detail-grid{grid-template-columns:1fr 1fr;} .file-header{grid-template-columns:1fr auto auto;} .file-date{display:none;} }
</style>
    <script src="nav.js"></script>
</head>
<body>
<nav style="display:none">
  <span class="nav-logo">MERIDIAN</span>
  <a href="index.html" style="font-family:'Space Mono',monospace;font-size:10px;letter-spacing:0.1em;color:#4a4a4a;text-decoration:none;transition:color 0.15s;" onmouseover="this.style.color='#e8e8e4'" onmouseout="this.style.color='#4a4a4a'">← DASHBOARD</a>
  <span class="nav-tag">TRANSACTION FILES</span>
</nav>

<div class="page-wrapper">
  <div class="page-header">
    <h1 class="page-title">Transaction Files</h1>
    <button class="btn-new" onclick="alert('New transaction form coming soon.')">+ NEW TRANSACTION</button>
  </div>

  <div class="file-list" id="file-list"></div>
</div>

<script>
const TRANSACTIONS = [
  {
    id: 'tx-a',
    label: 'Transaction A',
    address: '8812 Oak Ave, Berwyn, IL 60402',
    client: 'Johnson Family',
    stage: 'closing',
    stageLabel: 'IN CLOSING',
    closing_date: 'March 21, 2026',
    last_contact: 'March 8, 2026',
    outstanding: 'HOA docs pending from seller',
    purchase_price: '$489,000',
    next_action: 'Follow up with listing agent on HOA docs. Closing in 11 days — this is the last blocker.',
    documents: [
      { name: 'Purchase Agreement',           status: 'ok' },
      { name: 'Inspection Report',            status: 'ok' },
      { name: 'Appraisal',                    status: 'ok' },
      { name: 'Loan Commitment Letter',       status: 'ok' },
      { name: 'HOA Disclosure Documents',     status: 'missing' },
      { name: 'Final Walkthrough Checklist',  status: 'pending' },
      { name: 'Wire Transfer Instructions',   status: 'ok' },
      { name: 'Closing Disclosure (CD)',      status: 'pending' },
    ]
  },
  {
    id: 'tx-b',
    label: 'Transaction B',
    address: '1140 Ridgeway Blvd, Oak Park, IL 60302',
    client: 'Patel Family',
    stage: 'pending',
    stageLabel: 'UNDER CONTRACT',
    closing_date: 'April 4, 2026',
    last_contact: 'March 7, 2026',
    outstanding: 'Inspection repair addendum not finalized',
    purchase_price: '$675,000',
    next_action: 'Buyer to decide on inspection repair requests by March 13. Attorney review window closes same day.',
    documents: [
      { name: 'Purchase Agreement',         status: 'ok' },
      { name: 'Inspection Report',          status: 'ok' },
      { name: 'Repair Addendum',            status: 'missing' },
      { name: 'Radon Mitigation Estimate',  status: 'pending' },
      { name: 'Loan Application',           status: 'ok' },
      { name: 'HOA Disclosure',             status: 'ok' },
      { name: 'Appraisal',                  status: 'pending' },
    ]
  },
  {
    id: 'tx-c',
    label: 'Transaction C',
    address: '320 S. Clinton St, Chicago, IL 60661',
    client: 'Marcus & Diana Torres',
    stage: 'offer',
    stageLabel: 'OFFER STAGE',
    closing_date: 'TBD',
    last_contact: 'March 9, 2026',
    outstanding: 'Counter offer response due March 11 · Pre-approval expired',
    purchase_price: '$1,150,000 (offer)',
    next_action: 'Urgent: get updated pre-approval before responding to seller counter. Counter expires March 11 at 5pm.',
    documents: [
      { name: 'Initial Offer',               status: 'ok' },
      { name: 'Pre-Approval Letter',         status: 'missing' },
      { name: 'Seller Counter Offer',        status: 'ok' },
      { name: 'Purchase Agreement',          status: 'pending' },
      { name: 'Proof of Funds (if needed)',  status: 'missing' },
    ]
  },
  {
    id: 'tx-d',
    label: 'Transaction D',
    address: '4450 W. Cermak Rd, Cicero, IL 60804',
    client: 'Angela Rossi (seller)',
    stage: 'listed',
    stageLabel: 'ACTIVE LISTING',
    closing_date: '—',
    last_contact: 'March 5, 2026',
    outstanding: '12 days on market — no offers yet',
    purchase_price: '$299,000 (list)',
    next_action: 'Discuss price reduction with seller this week. Comparable closed at $287k. Market time is costing leverage.',
    documents: [
      { name: 'Listing Agreement',           status: 'ok' },
      { name: 'Disclosure Report',           status: 'ok' },
      { name: 'Lead Paint Disclosure',       status: 'ok' },
      { name: 'Cicero POS Inspection',       status: 'ok' },
      { name: 'MLS Listing Photos',          status: 'ok' },
      { name: 'Seller Net Sheet',            status: 'pending' },
    ]
  },
];

function renderFiles() {
  document.getElementById('file-list').innerHTML = TRANSACTIONS.map(tx => `
    <div class="file-card" id="${tx.id}">
      <div class="file-header" onclick="toggleFile('${tx.id}')">
        <div class="file-name-block">
          <span class="file-name">${tx.label} — ${tx.address}</span>
          <span class="file-client">${tx.client}</span>
        </div>
        <span class="file-stage ${tx.stage}">${tx.stageLabel}</span>
        <span class="file-date">Closing: ${tx.closing_date}</span>
        <span class="file-chevron">›</span>
      </div>
      <div class="file-detail">
        <div class="detail-grid">
          <div class="d-block"><span class="d-label">Purchase Price</span><span class="d-value">${tx.purchase_price}</span></div>
          <div class="d-block"><span class="d-label">Closing Date</span><span class="d-value">${tx.closing_date}</span></div>
          <div class="d-block"><span class="d-label">Last Contact</span><span class="d-value">${tx.last_contact}</span></div>
          <div class="d-block" style="grid-column:1/-1"><span class="d-label">Outstanding Items</span><span class="d-value" style="color:${tx.outstanding.toLowerCase().includes('missing')||tx.outstanding.toLowerCase().includes('expired')||tx.outstanding.toLowerCase().includes('due')?'var(--red-text)':'var(--off-white)'}">${tx.outstanding}</span></div>
        </div>

        <div class="docs-section">
          <p class="docs-title">DOCUMENT CHECKLIST</p>
          <div class="docs-list">
            ${tx.documents.map(doc => `
              <div class="doc-row">
                <span class="doc-name">${doc.name}</span>
                <span class="doc-status ${doc.status}">${doc.status.toUpperCase()}</span>
              </div>
            `).join('')}
          </div>
        </div>

        <div class="next-action">
          <span class="na-prefix">NEXT ACTION</span>
          <span class="na-text">${tx.next_action}</span>
        </div>
      </div>
    </div>
  `).join('');
}

function toggleFile(id) {
  const card = document.getElementById(id);
  const isOpen = card.classList.contains('open');
  document.querySelectorAll('.file-card.open').forEach(c => c.classList.remove('open'));
  if (!isOpen) card.classList.add('open');
}

renderFiles();
</script>
</body>
</html>
